<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>04 · Dot Product — LA1 3D</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="la-utils.js"></script>
<style>
  body { margin:0; background:#0a0a0f; font-family:'Space Mono',monospace; }
  #ui { position:fixed; top:0; left:0; right:0; z-index:10; pointer-events:none; }
  .panel { background:rgba(10,10,15,0.88); border-bottom:1px solid #1e1e2e; padding:1rem 1.4rem; max-width:620px; }
  .panel h2 { font-size:0.9rem; color:#7fff6e; margin-bottom:0.3rem; }
  .panel p  { font-size:0.75rem; color:#888; line-height:1.5; }
  .cases { display:flex; gap:1.2rem; margin-top:0.4rem; font-size:0.72rem; }
  .case  { padding:0.3rem 0.6rem; border-radius:3px; }
  #back { position:fixed; top:1rem; right:1rem; z-index:20; color:#7fff6e;
          text-decoration:none; font-size:0.7rem; background:rgba(10,10,15,0.9);
          border:1px solid #1e1e2e; padding:0.4rem 0.8rem; pointer-events:all; }
</style>
</head>
<body>
<div id="ui">
  <div class="panel">
    <h2>04 · Dot Product — three cases</h2>
    <p>The dot product measures how much two vectors align.
       Three pairs shown, offset along Z so they don't overlap.</p>
    <div class="cases">
      <span class="case" style="background:#1a2a1a;color:#7fff6e">Aligned → dot &gt; 0</span>
      <span class="case" style="background:#1a1a2a;color:#5ec4ff">Perpendicular → dot = 0</span>
      <span class="case" style="background:#2a1a1a;color:#ff5566">Opposing → dot &lt; 0</span>
    </div>
  </div>
</div>
<a id="back" href="index.html">← index</a>

<a-scene background="color:#0a0a0f" renderer="antialias:true">
</a-scene>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const scene = document.querySelector('a-scene');
  buildScene(scene, { camPos:'6 5 10', showAxes:false, showGrid:false });

  const cases = [
    { a:[2,0,0],  b:[1.5,0,0],   zOff:-3, label:'Aligned',      lcolor:'#7fff6e', dot:3 },
    { a:[1.5,0,0],b:[0,1.5,0],   zOff: 0, label:'Perpendicular', lcolor:'#5ec4ff', dot:0 },
    { a:[2,0,0],  b:[-2,0,0],    zOff: 3, label:'Opposing',      lcolor:'#ff5566', dot:-4 },
  ];

  cases.forEach(({a, b, zOff, label, lcolor, dot}) => {
    const off = [0, 0, zOff];
    const ao = LA.add(a, off);
    const bo = LA.add(b, off);

    scene.appendChild(makeArrow(off, ao, '#5ec4ff', 1, 0.05, 0.1, 0.2));
    scene.appendChild(makeArrow(off, bo, '#ff9966', 1, 0.05, 0.1, 0.2));

    // Axis lines in background
    const axLine = document.createElement('a-entity');
    axLine.setAttribute('line', `start: ${-3+zOff*0} 0 ${zOff}; end: ${3} 0 ${zOff}; color: #1e1e2e`);
    scene.appendChild(axLine);

    scene.appendChild(makeLabel(`${label}`, [0.5, 2.0, zOff], lcolor, 0.16));
    scene.appendChild(makeLabel(`a·b = ${dot}`, [0.5, 1.6, zOff], '#aaa', 0.14));

    // Origin dot
    const o = document.createElement('a-sphere');
    o.setAttribute('radius','0.07'); o.setAttribute('color','#555');
    o.setAttribute('position', off.join(' ')); scene.appendChild(o);
  });

  // Horizontal guide grid per case
  for (let z of [-3,0,3]) {
    for (let i=-3; i<=3; i++) {
      const l = document.createElement('a-entity');
      l.setAttribute('line',`start:${i} 0 ${z-0.5}; end:${i} 0 ${z+0.5}; color:#111`);
      scene.appendChild(l);
    }
  }
});
</script>
</body>
</html>
