<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>06 · Unit Vectors — LA1 3D</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="la-utils.js"></script>
<style>
  body { margin:0; background:#0a0a0f; font-family:'Space Mono',monospace; }
  #ui { position:fixed; top:0; left:0; right:0; z-index:10; pointer-events:none; }
  .panel { background:rgba(10,10,15,0.88); border-bottom:1px solid #1e1e2e; padding:1rem 1.4rem; max-width:580px; }
  .panel h2 { font-size:0.9rem; color:#7fff6e; margin-bottom:0.3rem; }
  .panel p  { font-size:0.75rem; color:#888; line-height:1.5; }
  #back { position:fixed; top:1rem; right:1rem; z-index:20; color:#7fff6e;
          text-decoration:none; font-size:0.7rem; background:rgba(10,10,15,0.9);
          border:1px solid #1e1e2e; padding:0.4rem 0.8rem; pointer-events:all; }
</style>
</head>
<body>
<div id="ui">
  <div class="panel">
    <h2>06 · Unit Vectors &amp; Normalisation</h2>
    <p>Dashed arrows = original vectors of different lengths. Solid arrows = normalised (length=1).
       All normalised tips land on the <strong style="color:#7fff6e">unit sphere</strong> (radius=1).</p>
  </div>
</div>
<a id="back" href="index.html">← index</a>

<a-scene background="color:#0a0a0f" renderer="antialias:true">
</a-scene>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const scene = document.querySelector('a-scene');
  buildScene(scene, { camPos:'4 3 7' });

  // Unit sphere (wireframe via low-segment sphere + high opacity)
  const sphere = document.createElement('a-sphere');
  sphere.setAttribute('radius', 1);
  sphere.setAttribute('color', '#7fff6e');
  sphere.setAttribute('opacity', 0.06);
  sphere.setAttribute('wireframe', true);
  sphere.setAttribute('segments-width', 18);
  sphere.setAttribute('segments-height', 18);
  scene.appendChild(sphere);

  // Equatorial ring
  const ring = document.createElement('a-torus');
  ring.setAttribute('radius', 1);
  ring.setAttribute('radius-tubular', 0.008);
  ring.setAttribute('color', '#7fff6e');
  ring.setAttribute('opacity', 0.4);
  ring.setAttribute('segments-tubular', 60);
  scene.appendChild(ring);

  const vectors = [
    [3,0,0], [0,2.5,0], [0,0,3.5], [2,2,1], [-1,2,2], [1,-2,1]
  ];
  const colors = ['#ff5566','#7fff6e','#5ec4ff','#ffcc44','#cc88ff','#ff9966'];

  vectors.forEach((v, i) => {
    const u = LA.norm(v);
    const col = colors[i];
    const mag = LA.mag(v);

    // Dashed original
    scene.appendChild(makeDashedLine([0,0,0], v, col, 30, 0.015));

    // Solid unit vector
    scene.appendChild(makeArrow([0,0,0], u, col, 1, 0.04, 0.09, 0.18));

    // Dot at tip of unit vector
    const dot = document.createElement('a-sphere');
    dot.setAttribute('radius', 0.06);
    dot.setAttribute('color', col);
    dot.setAttribute('position', u.join(' '));
    scene.appendChild(dot);

    scene.appendChild(makeLabel(`|v|=${mag.toFixed(1)}`, [v[0]*0.6, v[1]*0.6+0.2, v[2]*0.6], col, 0.12));
  });

  // Label
  scene.appendChild(makeLabel('unit sphere\n(r=1)', [1.3, 1.2, 0], '#7fff6e', 0.15));
});
</script>
</body>
</html>
