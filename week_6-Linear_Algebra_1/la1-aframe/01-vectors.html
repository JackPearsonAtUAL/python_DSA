<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>01 · Vectors — LA1 3D</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="la-utils.js"></script>
<style>
  body { margin:0; background:#0a0a0f; font-family:'Space Mono',monospace; }
  #ui { position:fixed; top:0; left:0; right:0; z-index:10; pointer-events:none; }
  .panel { background:rgba(10,10,15,0.88); border-bottom:1px solid #1e1e2e;
           padding:1rem 1.4rem; max-width:520px; }
  .panel h2 { font-size:0.9rem; color:#7fff6e; margin-bottom:0.3rem; letter-spacing:0.05em; }
  .panel p  { font-size:0.75rem; color:#888; line-height:1.5; }
  .panel .formula { color:#5ec4ff; margin-top:0.3rem; font-size:0.8rem; }
  #back { position:fixed; top:1rem; right:1rem; z-index:20; color:#7fff6e;
          text-decoration:none; font-size:0.7rem; background:rgba(10,10,15,0.9);
          border:1px solid #1e1e2e; padding:0.4rem 0.8rem; pointer-events:all; }
</style>
</head>
<body>
<div id="ui">
  <div class="panel">
    <h2>01 · Vectors — meaning &amp; representation</h2>
    <p>A vector is an ordered list of numbers encoding <em>magnitude</em> and <em>direction</em>.
       Here <strong style="color:#5ec4ff">v = [3, 2, 1]</strong>. Dashed lines show the x, y, z components.</p>
    <div class="formula">v = [3, 2, 1] &nbsp;|v| = √(9+4+1) = √14 ≈ 3.74</div>
  </div>
</div>
<a id="back" href="index.html">← index</a>

<a-scene background="color:#0a0a0f" renderer="antialias:true">
</a-scene>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const scene = document.querySelector('a-scene');
  buildScene(scene, { camPos:'5 4 8' });

  const v = [3, 2, 1];

  // Main arrow
  scene.appendChild(makeArrow([0,0,0], v, '#5ec4ff', 1, 0.05, 0.1, 0.25));

  // Component guide lines (dashed)
  scene.appendChild(makeDashedLine([0,0,0],[v[0],0,0],'#ff5555',30));   // x
  scene.appendChild(makeDashedLine([v[0],0,0],[v[0],v[1],0],'#55ff55',20)); // y
  scene.appendChild(makeDashedLine([v[0],v[1],0],[v[0],v[1],v[2]],'#5599ff',16)); // z

  // Corner dots
  [[v[0],0,0],[v[0],v[1],0],[v[0],v[1],v[2]]].forEach((p,i) => {
    const s = document.createElement('a-sphere');
    s.setAttribute('radius',0.06);
    s.setAttribute('color',['#ff5555','#55ff55','#5ec4ff'][i]);
    s.setAttribute('position',p.join(' '));
    scene.appendChild(s);
  });

  // Labels
  scene.appendChild(makeLabel('v = [3, 2, 1]', [1.8,2.6,0.6], '#5ec4ff', 0.18));
  scene.appendChild(makeLabel('x = 3', [1.5,-0.3,0], '#ff5555', 0.14));
  scene.appendChild(makeLabel('y = 2', [3.2,1.0,0], '#55ff55', 0.14));
  scene.appendChild(makeLabel('z = 1', [3.2,2.0,0.5], '#5599ff', 0.14));

  // Origin dot
  const o = document.createElement('a-sphere');
  o.setAttribute('radius',0.08); o.setAttribute('color','#ffffff');
  o.setAttribute('position','0 0 0'); scene.appendChild(o);
});
</script>
</body>
</html>
