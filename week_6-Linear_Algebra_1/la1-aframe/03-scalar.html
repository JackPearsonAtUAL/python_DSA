<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>03 · Scalar Multiplication — LA1 3D</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="la-utils.js"></script>
<style>
  body { margin:0; background:#0a0a0f; font-family:'Space Mono',monospace; }
  #ui { position:fixed; top:0; left:0; right:0; z-index:10; pointer-events:none; }
  .panel { background:rgba(10,10,15,0.88); border-bottom:1px solid #1e1e2e; padding:1rem 1.4rem; max-width:560px; }
  .panel h2 { font-size:0.9rem; color:#7fff6e; margin-bottom:0.3rem; }
  .panel p  { font-size:0.75rem; color:#888; line-height:1.5; }
  #back { position:fixed; top:1rem; right:1rem; z-index:20; color:#7fff6e;
          text-decoration:none; font-size:0.7rem; background:rgba(10,10,15,0.9);
          border:1px solid #1e1e2e; padding:0.4rem 0.8rem; pointer-events:all; }
</style>
</head>
<body>
<div id="ui">
  <div class="panel">
    <h2>03 · Scalar Multiplication</h2>
    <p>The base vector <strong style="color:#ffffff">v=[1,1,0.5]</strong> scaled by four scalars simultaneously.
       All arrows share the same direction — only magnitude (and sign) change.</p>
  </div>
</div>
<a id="back" href="index.html">← index</a>

<a-scene background="color:#0a0a0f" renderer="antialias:true">
</a-scene>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const scene = document.querySelector('a-scene');
  buildScene(scene, { camPos:'5 4 9' });

  const v = [1, 1, 0.5];

  const configs = [
    { s:  2.0, color:'#5ec4ff',  label:'2·v' },
    { s:  1.0, color:'#ffffff',  label:'v' },
    { s:  0.5, color:'#7fff6e',  label:'0.5·v' },
    { s: -1.0, color:'#ff5566',  label:'−v' },
  ];

  configs.forEach(({s, color, label}) => {
    const sv = LA.scale(s, v);
    scene.appendChild(makeArrow([0,0,0], sv, color, 0.9, 0.05, 0.1, 0.2));
    // label at midpoint
    const mp = LA.scale(0.6, sv);
    scene.appendChild(makeLabel(`${label}=[${sv.map(x=>+x.toFixed(1))}]`,
      [mp[0]+0.15, mp[1]+0.2, mp[2]], color, 0.15));
  });

  // Origin
  const o = document.createElement('a-sphere');
  o.setAttribute('radius','0.09'); o.setAttribute('color','#aaa');
  o.setAttribute('position','0 0 0'); scene.appendChild(o);
  scene.appendChild(makeLabel('origin', [0.2,-0.25,0], '#666', 0.12));
});
</script>
</body>
</html>
